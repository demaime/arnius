name: scrape

on:
  schedule:
    # 8 corridas por día: 07, 09, 11, 13, 15, 17, 19 y 21 hs de Argentina (UTC-3).
    # GitHub puede demorar el inicio unos minutos; es esperable.
    - cron: "10 0,10,12,14,16,18,20,22 * * *"
  workflow_dispatch: {}

# Nunca dos corridas superpuestas.
concurrency:
  group: scrape
  cancel-in-progress: false

permissions:
  contents: read
  # Requerido por el keepalive para re-habilitar el workflow vía API.
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Scrapear portales
        run: npm run scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # GitHub deshabilita los crons de repos sin actividad por 60 días
      # (así murió la versión anterior de este proyecto). Este paso lo
      # re-habilita vía API en cada corrida, sin commits dummy.
      - uses: gautamkrishnar/keepalive-workflow@v2
        if: always()
