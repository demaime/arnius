name: scrape

on:
  schedule:
    # Horario diurno argentino (07:00-23:30 ART = 10-26:30 UTC): cada 30 min.
    # GitHub puede demorar el inicio unos minutos; es esperable.
    - cron: "10,40 10-23 * * *" # 07:10-20:40 ART
    - cron: "10,40 0-2 * * *" # 21:10-23:40 ART
    # Madrugada (00-07 ART): cada 2 horas, los portales casi no publican.
    - cron: "10 4,6,8 * * *" # 01:10, 03:10, 05:10 ART
  workflow_dispatch: {}

# Nunca dos corridas superpuestas.
concurrency:
  group: scrape
  cancel-in-progress: false

permissions:
  contents: read
  # Requerido por el keepalive para re-habilitar el workflow vía API.
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Scrapear portales
        run: npm run scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # GitHub deshabilita los crons de repos sin actividad por 60 días
      # (así murió la versión anterior de este proyecto). Este paso re-habilita
      # el workflow vía la API oficial en cada corrida: mientras corra, no
      # puede apagarse. Sin actions de terceros ni commits dummy.
      - name: Keepalive (anti auto-disable de 60 días)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method PUT repos/${{ github.repository }}/actions/workflows/scrape.yml/enable
